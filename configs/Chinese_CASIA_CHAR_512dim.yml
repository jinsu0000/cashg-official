ENV:
  MODE: train_handwriting_generator

  CHAR_DATASET_PATH: dataset/CN/CASIA_CHINESE/casia_char_pickles
  SENT_DATASET_PATH: dataset/CN/CASIA_CHINESE/casia_sent_pickles
  STYLE_DATASET_PATH: dataset/CN/CASIA_CHINESE/casia_style_pickles

  STYLE_REF_MODE: representative

  PRELOAD_DATA: true

  FONT_DATASET_IMG_PATH: dataset/CN/CASIA_CHINESE/Chinese_content.pkl
  FONT_DATASET_DICT_PATH: dataset/CN/CASIA_CHINESE/character_dict.pkl

  SAVE_MODEL_DIR: saved/cn_char
  IMG_H: 64
  IMG_W: 64
  DATALOADER_WORKERS: 2
  DATALOADER_PREFETCH_FACTOR: 1
  STYLE_TENSOR_CACHE_MAX_ITEMS: 4096
  PIN_MEMORY: false
  COORD_NORMALIZER: normalize_xy_abs_symmetric

  WRITER_SPLIT:
    ENABLED: true
    TRAIN_LIST: [40000, 41999]
    TEST_LIST: [42000, 99999]

  SAMPLE_SPLIT:
    ENABLED: false


MODEL:
  STYLE_DIM: 512
  ENCODER_TYPE: RESNET18
  BASE_LAYERS: 2
  BASE_NHEAD: 8
  HEAD_LAYERS : 1
  HEAD_NHEAD: 8
  PATCH_SIZE: 16

  FREEZE_BACKBONE_BN: false

  USE_CONTEXT_AS_CONTENT: true

  CONTEXT_BACKBONE: google/canine-c
  CONTEXT_DIM: 512
  CONTEXT_LAYERS: 2
  CONTEXT_NHEAD: 8
  CONTEXT_DROPOUT: 0.1
  CONTEXT_FREEZE_BACKBONE: true
  CONTEXT_USE_CHAR_ID_EMB: true
  CONTEXT_CHAR_ID_EMB_DIM: 128
  CONTEXT_MAX_CHAR_ID: 500000

  CONTEXT_TOKEN_DROPOUT_STAGE1: 0.0
  CONTEXT_TOKEN_DROPOUT_STAGE2: 0.0
  CONTEXT_TOKEN_DROPOUT_STAGE3: 0.0

  FREEZE_STYLE_IDENTIFIER : False

  FONT_DIM: 512
  FONT_HEAD_LAYERS : 3

  HWGEN_DIM: 512
  HWGEN_WRITER_LAYERS: 2
  HWGEN_GLYPH_LAYERS: 2

  USE_CONTEXT_GATING: true
  CONTEXT_GATE_INIT: -1.5

  N_GRAM_AWARE_SLIDING_WINDOW: 2

  USE_CONTEXT_DECODER: true

  USE_ROPE: true
  ROPE_BASE: 1000.0

  ENCODER_VQ_START_ITER: -1

  ENCODER_VQ_CODEBOOK_SIZE: 2048
  ENCODER_VQ_EMBED_DIM: 256
  ENCODER_VQ_COMMITMENT_WEIGHT: 0.02
  ENCODER_VQ_CODEBOOK_DECAY: 0.99

  DECODER_VQ_START_ITER: -1

  DECODER_VQ_NUM_QUANTIZERS: 4
  DECODER_VQ_CODEBOOK_SIZE: 1024
  DECODER_VQ_EMBED_DIM: 128
  DECODER_VQ_COMMITMENT_WEIGHT: 0.25
  DECODER_VQ_CODEBOOK_DECAY: 0.99
  DECODER_VQ_CLAMP_SCALE: 0.05
  DECODER_VQ_GATE_INIT: 0.0

HYPERPARAMETER:

  BASE_LR: 0.00015
  MAX_ITER: 1000000
  WARMUP_ITERS: 10000
  STAGE_WARMUP_ITERS: 2000
  TYPE: AdamW
  SEED: 1001

  USE_AMP: false

  GRAD_ACCUM_STEPS_STAGE1: 1
  GRAD_ACCUM_STEPS_STAGE2: 1
  GRAD_ACCUM_STEPS_STAGE3_CHAR: 1
  GRAD_ACCUM_STEPS_STAGE3_SENT: 4

TRAIN:
  NUM_REFERENCE_IMGS: 15

  DEBUG_LOSS_VALIDATION: false

  DEBUG_CONTEXT_VALIDATION: false

  STAGE1_ONLY: true

  CHAR_BATCH_SIZE: 64
  BIGRAM_BATCH_SIZE: 32
  SENT_BATCH_SIZE: 16

  GRAD_EXPLOSION_THRESHOLD: 1000.0

  CHECKPOINT_BEGIN: 10000
  CHECKPOINT_ITERS: 10000
  SNAPSHOT_BEGIN: 500
  SNAPSHOT_ITERS: 500
  VISUALIZATION_BEGIN: 1000
  VISUALIZATION_ITERS: 1000
  STYLE_REF_VISUALIZATION_BEGIN: 10000
  STYLE_REF_VISUALIZATION_ITERS: 10000

  USE_GT_PREV_FOR_INFERENCE: false

  PEN_STATE_CLASS_WEIGHT: [1.0, 1.0, 0, 1.5]

  VALIDATE_BEGIN: 100000
  VALIDATE_ITERS: 5000

  CHAR_STAGE_ITERS: 20000
  STAGE1_GRAD_CLIP_NORM: 1.0
  CHAR_STEP_STYLE_LOSS_WEIGHT: 1.0
  CHAR_STEP_CHAR_GEN_LOSS_WEIGHT: 1.0

  BIGRAM_STAGE_ITERS: 100000
  STAGE2_GRAD_CLIP_NORM: 0.5
  STAGE2_CONTRASTIVE_TEMPERATURE: 0.07
  BIGRAM_STEP_STYLE_LOSS_WEIGHT: 0.3
  BIGRAM_STEP_CHAR_GEN_LOSS_WEIGHT: 0.3
  BIGRAM_STEP_BIGRAM_GEN_LOSS_WEIGHT: 1.0
  BIGRAM_STEP_VDL_LOSS_WEIGHT: 0.01

  VDL_CENTROID_WEIGHT: 2.0
  VDL_TOP_WEIGHT: 1.0
  VDL_BOTTOM_WEIGHT: 1.0

  STAGE3_GRAD_CLIP_NORM: 0.5
  STAGE3_CONTRASTIVE_TEMPERATURE: 0.07
  SENT_STEP_STYLE_LOSS_WEIGHT: 0.2
  SENT_STEP_CHAR_GEN_LOSS_WEIGHT: 0.3
  SENT_STEP_SENT_GEN_LOSS_WEIGHT: 1.0
  SENT_STEP_VDL_LOSS_WEIGHT: 0.02

  ENCODER_VQ_LOSS_WEIGHT: 0.1
  ENCODER_VQ_WARMUP_ITERS: 60000
  DECODER_VQ_LOSS_WEIGHT: 0.25
  DECODER_VQ_WARMUP_ITERS: 30000

VALID:
  NUM_REFERENCE_IMGS: 15
  BATCH_SIZE: 8
  VALID_STYLE_LOSS_WEIGHT: 0.5
  VALID_SENT_GEN_LOSS_WEIGHT: 0.5
  MAX_LEN: 150

SAVE:
  RESUME_PATH: null

  START_PATH: null
  START_MODULES:
    STYLE_IDENTIFIER: true
    FONT_ENCODER: true
    HANDWRITING_GENERATOR: true
    CONTEXT_ENCODER: true
    RVQ_CODEBOOK: true
DATASET:
  USE_SDT_IMG_NORM: true
  ALLOW_MISSING_ISOLATED: false
